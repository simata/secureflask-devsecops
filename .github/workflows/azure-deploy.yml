name: "Build, Scan & Deploy to Azure"

on:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ======================================================
  # JOB 1: Test
  # ======================================================
  test:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install and test
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          python -m pytest tests/ -v --cov=src --cov-report=term-missing

  # ======================================================
  # JOB 2: Security Scans (SAST + Dependencies + IaC)
  # ======================================================
  security-scan:
    name: "Security Scans"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: SAST — Bandit
        run: |
          pip install bandit
          bandit -r src/ --severity-level medium -f json -o bandit-report.json || true
          bandit -r src/ --severity-level medium || true

      - name: Dependency scan — pip-audit
        run: |
          pip install -r requirements.txt
          pip install pip-audit
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit || true

      - name: IaC scan — Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true
          quiet: true

      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  # ======================================================
  # JOB 3: Build, Scan Container & Push to ACR
  # ======================================================
  build-and-push:
    name: "Build & Push to ACR"
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/secureflask:${{ env.IMAGE_TAG }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/secureflask:latest \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.ACR_LOGIN_SERVER }}/secureflask:${{ env.IMAGE_TAG }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Push to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/secureflask:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/secureflask:latest

  # ======================================================
  # JOB 4: Deploy to Azure Container Apps
  # ======================================================
  deploy:
    name: "Deploy to Azure"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new revision
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/secureflask:${{ env.IMAGE_TAG }}

      - name: Verify deployment
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed to: https://${APP_URL}"

          # Wait for the new revision to be ready
          sleep 30

          # Health check
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${APP_URL}/health)
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Deployment healthy — HTTP 200"
          else
            echo "Deployment may have issues — HTTP ${HTTP_STATUS}"
            exit 1
          fi